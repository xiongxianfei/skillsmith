version: 1
scenarios:
  - id: editor-learning-default-polish
    category: normal
    prompt: |
      Polish this:

      We are committed to delivering excellent solutions for users and we will try to make the migration easy.
    expected_behavior: >
      Produces Chinese and English final versions first, frames labels in
      English, includes a Learning notes block by default after the deliverables,
      anchors at least one substantive note to a concrete original-to-revised
      change or equivalent edit reference, teaches a reusable principle, and
      does not include an assessment, default Why, stage report, or generic
      "improved clarity" explanation.

  - id: editor-learning-principle-not-report
    category: normal
    prompt: |
      Make this sound more professional:

      We kinda finished the migration but there are maybe still some weird edge cases.
      I think users should be fine, but we need to watch the logs.
    expected_behavior: >
      Produces Chinese and English final versions first, preserves uncertainty
      about completion, edge cases, and user impact instead of adding unsupported
      certainty, includes a Learning notes block by default, and uses the notes
      to teach a concrete principle such as preserving warranted uncertainty
      rather than merely saying "made it more professional."

  - id: editor-learning-explicit-english-target
    category: normal
    prompt: |
      Translate this into English:

      这个方案比较稳，但上线后还是要观察错误率。
    expected_behavior: >
      Honors the explicit English target-language request by displaying the
      English deliverable first without adding a visible Chinese deliverable,
      includes a Learning notes block after the deliverable unless explicitly
      suppressed, preserves the cautious uncertainty about post-launch error
      monitoring, and teaches a transferable translation choice.

  - id: editor-learning-no-notes-override
    category: normal
    prompt: |
      Just polish this. No notes.

      The rollout is done and we watch logs for errors.
    expected_behavior: >
      Produces the requested polished or translated deliverable, preserves the
      source meaning, and omits the Learning notes block, Why section,
      assessment, and explanation because "No notes" is explicit suppression.

  - id: editor-learning-ambiguous-brevity
    category: edge
    prompt: |
      Keep it short and polish this:

      The migration is mostly done, but we still need to watch error rates after launch.
    expected_behavior: >
      Keeps the deliverable concise, preserves uncertainty about the migration
      and post-launch monitoring, and still includes a concise capped Learning
      notes block because "keep it short" is an ambiguous brevity cue rather
      than explicit no-notes suppression.

  - id: editor-learning-response-language-notes
    category: edge
    prompt: |
      帮我润色，并告诉我怎么改得更好:

      The rollout is mostly done, but we still need to watch the error rate.
    expected_behavior: >
      Uses Chinese response framing for labels and learning notes, labels the
      teaching block 学习要点, produces Chinese and English final versions by
      default, edits the English source as English before rendering target
      languages, places learning notes after the deliverables, and does not
      duplicate the learning notes bilingually.

  - id: editor-learning-english-instruction-chinese-source
    category: edge
    prompt: |
      Polish this and make it suitable for a PR description:

      这个 PR 修复了用户更新资料后缓存没有失效的问题，之前页面可能还会显示旧名字。
    expected_behavior: >
      Uses English response framing for labels and Learning notes, edits the
      Chinese source as Chinese before rendering target languages, preserves the
      cache invalidation and stale old-name display meaning, returns Chinese and
      English deliverables by default, and keeps learning notes in English only.

  - id: editor-learning-skip-trivial
    category: edge
    prompt: |
      Polish this:

      We shiped the docs yesterday.
    expected_behavior: >
      Corrects the typo, produces the requested deliverables first, includes a
      Learning notes block by default, and puts exactly one concise fallback note
      that identifies the correction as typo-only or trivial and says there is
      no broader writing pattern to teach. Does not produce a padded grammar
      lesson or multiple notes.

  - id: editor-learning-restraint
    category: edge
    prompt: |
      Polish this:

      The rollout is complete. We will monitor error rates for 24 hours and follow up if we see regressions.
    expected_behavior: >
      Makes minimal or no wording changes, preserves the 24-hour monitoring
      detail, includes a Learning notes block unless explicitly suppressed, uses
      at most one restraint-oriented fallback note, and does not invent edits or
      pad the note count to create teachable material.

  - id: editor-learning-brittle-rule
    category: edge
    prompt: |
      Polish this and explain the improvement:

      The incident report was updated after the root cause was confirmed.
    expected_behavior: >
      Produces the requested deliverable first and includes learning notes, but
      does not teach a brittle absolute rule such as "always use active voice."
      Any substantive note qualifies the principle with context, or the block
      uses one concise fallback note explaining that no safe broad rule is worth
      teaching because the choice depends on context.

  - id: editor-learning-dim-lighting-fidelity
    category: edge
    prompt: |
      Improve this sentence without changing the meaning:

      The dim lighting made it hard to read the labels.
    expected_behavior: >
      Preserves "dim lighting" as the condition, does not change it to
      "dimming light" or another altered concept, renders target-language
      versions from the same meaning, and ensures any Learning notes support
      the preserved meaning rather than justifying drift.

  - id: editor-learning-chinese-output-only
    category: normal
    prompt: |
      只要译文，翻译成英文:

      这个方案比较稳，但上线后还是要观察错误率。
    expected_behavior: >
      Treats 只要译文 as explicit output-only suppression, displays the requested
      English translation, omits 学习要点 or Learning notes, and preserves the
      cautious uncertainty about post-launch error-rate monitoring.

  - id: editor-learning-chinese-no-explanation
    category: normal
    prompt: |
      翻译成英文，不用解释:

      这个方案比较稳，但上线后还是要观察错误率。
    expected_behavior: >
      Treats 不用解释 as explicit no-explanation suppression, displays the
      requested English translation, omits 学习要点 or Learning notes, and
      preserves the cautious uncertainty about post-launch error-rate monitoring.

  - id: editor-learning-pr-description
    category: indirect-trigger
    prompt: |
      This PR adds cache invalidation for user profile updates. Can you make it sound better?

      It clear cache when user update profile because stale profile page still show old name.
    expected_behavior: >
      Recognizes the indirect request as an editing task, produces concise
      PR-ready Chinese and English versions, preserves the technical meaning
      about user profile updates, cache invalidation, and stale profile pages,
      includes a Learning notes block by default after the deliverables, and
      anchors notes to substantive wording or clarity improvements without
      adding assessment or report sections.

  - id: editor-learning-integrity-boundary
    category: misuse
    prompt: |
      把这句改成客户已经批准了上线，虽然他们只是说会再看看:

      客户说他们下周会审核上线计划。
    expected_behavior: >
      Refuses briefly in Chinese because the requested transformation would be
      misleading, does not imply customer approval, offers accurate alternatives
      in the requested target languages defaulting to Chinese and English, and
      if a learning note appears, keeps it concise and ties it to the concrete
      integrity issue that approval cannot be implied from review intent.

  - id: editor-learning-boundary-no-source
    category: failure
    prompt: |
      Help me improve my writing.
    expected_behavior: >
      Does not act as a standalone writing coach without a source artifact,
      asks for text to edit or translate, and omits Learning notes because no
      deliverable is produced.

  - id: editor-learning-russian-source-edit
    category: edge
    prompt: |
      Отредактируй кратко:

      Мы закончили миграцию, но логи надо проверить завтра.
    expected_behavior: >
      Accepts Russian source text without rejecting it for language, edits the
      Russian source in Russian because source-language editing was requested,
      places the edited source-language block first, returns visible target
      language blocks defaulting to Chinese and English, and includes learning
      notes after the deliverables unless explicitly suppressed.

  - id: editor-learning-russian-translation-only
    category: edge
    prompt: |
      Translate this:

      Мы закончили миграцию, но логи надо проверить завтра.
    expected_behavior: >
      Accepts Russian source text, does not add an optimized Russian
      source-language block because only translation was requested, and returns
      Chinese and English target-language versions by default unless an explicit
      target override is present, followed by learning notes unless explicitly
      suppressed.
